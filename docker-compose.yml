version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: sovereign_postgres
    environment:
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: sovereign_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovereign"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: sovereign_redis
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5.16
    container_name: sovereign_neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_plugins:/plugins

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sovereign_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  neo4j_data:
  neo4j_plugins:
  qdrant_data:
