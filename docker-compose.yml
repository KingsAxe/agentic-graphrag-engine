version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg17 # Standardized vector-enabled Postgres
    container_name: rag_db
    restart: always
    environment:
      POSTGRES_DB: knowledge_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/database/schema.sql:/docker-entrypoint-initdb.d/init.sql

  # The Streamlit app will be added here once we build the Dockerfile
  # For now, we run Postgres to verify the schema.

volumes:
  postgres_data: